<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ay Vadisi Savunması</title>
<style>
  :root{
    --bg-deep:#08091a; --panel:#11132b; --panel-edge:#282d55;
    --neon-cyan:#08d9d6; --gold:#ffd166; --dust:#d9c5ff; --hp:#ff4d6d;
    --ink:#eef1ff; --ink-dim:rgba(238,241,255,0.55);
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%; background:var(--bg-deep);
    overflow:hidden; touch-action:none; -webkit-user-select:none; user-select:none;
    font-family:-apple-system,'Segoe UI',Poppins,sans-serif; color:var(--ink);
  }
  #gameCanvas{ display:block; width:100vw; height:100vh; }

  #topBar{
    position:fixed; top:0; left:0; width:100%; box-sizing:border-box; height:56px;
    display:flex; align-items:center; justify-content:space-between; padding:0 8px; gap:4px;
    background:linear-gradient(to bottom, rgba(8,9,26,0.94), rgba(8,9,26,0.5));
    border-bottom:1px solid var(--panel-edge); z-index:8; overflow:hidden;
  }
  .stat{display:flex; align-items:center; gap:4px; font-weight:800; font-size:12.5px; white-space:nowrap;}
  #goldStat{color:var(--gold); text-shadow:0 0 10px rgba(255,209,102,0.5);}
  #lifeStat{color:var(--hp); text-shadow:0 0 10px rgba(255,77,109,0.5);}
  #waveStat{color:var(--ink); opacity:0.9; font-size:10.5px; text-align:center;}
  #waveStat b{color:var(--neon-cyan);}
  #nextWaveBtn{
    background:linear-gradient(135deg, var(--neon-cyan), #05a8a6); border:none; color:#03282a;
    font-weight:800; font-size:10.5px; padding:7px 9px; border-radius:15px; white-space:nowrap;
    box-shadow:0 4px 14px rgba(8,217,214,0.35);
  }
  #nextWaveBtn:disabled{ background:#2a2e4d; color:rgba(238,241,255,0.35); box-shadow:none; }
  #speedBtn{ background:var(--panel); border:1.5px solid var(--panel-edge); color:var(--ink); font-weight:800; font-size:10.5px; padding:7px 8px; border-radius:13px; }
  #speedBtn.active{ border-color:var(--gold); color:var(--gold); }
  #autoWaveBtn{ background:var(--panel); border:1.5px solid var(--panel-edge); color:var(--ink); font-weight:800; font-size:9.5px; padding:7px 7px; border-radius:13px; }
  #autoWaveBtn.active{ border-color:#5eead4; color:#5eead4; box-shadow:0 0 10px rgba(94,234,212,0.4); }

  #bottomBar{
    position:fixed; bottom:0; left:0; width:100%; box-sizing:border-box;
    display:flex; gap:5px; justify-content:flex-start; align-items:stretch;
    padding:6px 6px calc(6px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(8,9,26,0.96), rgba(8,9,26,0.65));
    border-top:1px solid var(--panel-edge); z-index:8; overflow-x:auto;
  }
  .towerCard{
    flex:0 0 58px; background:var(--panel); border:1.5px solid var(--panel-edge); border-radius:10px;
    padding:4px 3px 4px; display:flex; flex-direction:column; align-items:center; gap:1px; position:relative;
  }
  .towerCard.selected{ box-shadow:0 0 0 2px rgba(8,217,214,0.35), 0 0 14px rgba(8,217,214,0.35); }
  .towerCard .swatch{ width:21px; height:21px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11.5px; }
  .towerCard .tname{ font-size:7.4px; font-weight:700; text-align:center; line-height:1.03; }
  .towerCard .tkind{ font-size:6.2px; opacity:0.55; text-transform:uppercase; letter-spacing:0.2px; }
  .towerCard .tcost{ font-size:8.6px; color:var(--gold); font-weight:800; }
  .towerCard.locked{ opacity:0.35; }
  .towerCard.locked .tcost{ color:var(--ink-dim); }
  .towerCard .dustTag{ position:absolute; top:2px; right:2px; font-size:7px; color:var(--dust); }

  #towerPanel{
    position:fixed; z-index:9; background:var(--panel); border:1.5px solid var(--panel-edge); border-radius:14px;
    padding:10px 12px; font-size:11.5px; box-shadow:0 10px 28px rgba(0,0,0,0.5); display:none; min-width:164px;
  }
  #towerPanel .tpTitle{ font-weight:800; font-size:12px; margin-bottom:4px; }
  #towerPanel .tpRow{ display:flex; justify-content:space-between; opacity:0.7; margin:1px 0; }
  #towerPanel .tpBtns{ display:flex; gap:6px; margin-top:8px; }
  #towerPanel button{ flex:1; border:none; border-radius:9px; padding:7px 4px; font-weight:800; font-size:11px; }
  #upgradeBtn{ background:linear-gradient(135deg, var(--neon-cyan), #05a8a6); color:#03282a; }
  #upgradeBtn:disabled{ background:#2a2e4d; color:rgba(238,241,255,0.35); }
  #sellBtn{ background:linear-gradient(135deg, #ff6b6b, #b0195f); color:#fff; }
  #closeTpBtn{ background:transparent; color:var(--ink-dim); flex:0 0 24px; }

  #overlay{
    position:fixed; inset:0; z-index:15; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    text-align:center; padding:22px 18px 40px; box-sizing:border-box;
    background:radial-gradient(ellipse at center, rgba(20,24,51,0.68) 0%, rgba(8,9,26,0.95) 78%);
    overflow-y:auto;
  }
  #overlay h1{
    font-size:clamp(20px,5.6vw,32px); margin:6px 0 10px 0; letter-spacing:0.4px;
    background:linear-gradient(90deg, var(--neon-cyan), var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  #overlay h3{ font-size:12px; margin:14px 0 6px; opacity:0.6; letter-spacing:0.5px; text-transform:uppercase; }
  #infiniteCornerBtn{
    position:absolute; top:14px; right:14px; z-index:16;
    background:var(--panel); border:1.5px solid var(--panel-edge); color:var(--ink);
    font-weight:800; font-size:11px; padding:8px 12px; border-radius:13px; cursor:pointer;
    display:flex; align-items:center; gap:5px; opacity:0.85;
  }
  #infiniteCornerBtn.active{ border-color:#5eead4; color:#5eead4; box-shadow:0 0 10px rgba(94,234,212,0.4); opacity:1; }
  .cornerCloseBtn{
    position:absolute; top:14px; left:14px; z-index:16;
    width:34px; height:34px; border-radius:50%;
    background:var(--panel); border:1.5px solid var(--panel-edge); color:var(--ink);
    font-size:16px; font-weight:800; display:flex; align-items:center; justify-content:center;
    cursor:pointer; opacity:0.85;
  }
  #exitBtn{
    background:var(--panel); border:1.5px solid var(--panel-edge); color:var(--ink);
    font-weight:800; font-size:12px; padding:6px 9px; border-radius:12px; cursor:pointer;
  }
  #overlay p{ margin:4px 0 16px; font-size:13px; opacity:0.75; max-width:400px; line-height:1.55; }
  #overlay .big{ font-size:clamp(28px,7.5vw,42px); font-weight:800; margin-bottom:2px; color:var(--gold); text-shadow:0 0 18px rgba(255,209,102,0.45); }
  #overlay .sub{ font-size:11px; opacity:0.6; margin-bottom:16px; }
  .btn{
    background:linear-gradient(135deg, var(--neon-cyan), #05a8a6); color:#03282a; border:none;
    padding:11px 24px; border-radius:22px; font-size:13px; font-weight:800;
    box-shadow:0 8px 22px rgba(8,217,214,0.3); margin:4px;
  }
  .btn.secondary{ background:var(--panel); color:var(--ink); border:1.5px solid var(--panel-edge); box-shadow:none; }
  .btn.dust{ background:linear-gradient(135deg, var(--dust), #8b6fd6); }
  .btn:active{ transform:scale(0.96); }
  .btn:disabled{ opacity:0.35; }
  .rowBtns{ display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap; justify-content:center; max-width:480px; }
  .pickBtn{ background:var(--panel); border:1.5px solid var(--panel-edge); color:var(--ink); padding:7px 11px; border-radius:14px; font-size:11px; font-weight:700; }
  .pickBtn.active{ border-color:var(--gold); color:var(--gold); }
  .menuRow{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:4px; align-items:center; }
  .marketWrap{ display:flex; flex-direction:column; align-items:center; margin:4px; }
  .marketLabel{ font-size:9.5px; opacity:0.6; letter-spacing:1px; margin-bottom:3px; text-transform:uppercase; }

  .metaGrid{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:560px; margin-bottom:8px; }
  .metaCard{ background:var(--panel); border:1.5px solid var(--panel-edge); border-radius:13px; padding:10px 11px; width:130px; text-align:left; }
  .metaCard .mTitle{ font-weight:800; font-size:11px; margin-bottom:3px; }
  .metaCard .mDesc{ font-size:9.5px; opacity:0.65; line-height:1.32; margin-bottom:7px; min-height:34px; }
  .metaCard .mLevel{ font-size:9.5px; color:var(--neon-cyan); margin-bottom:6px; }
  .metaCard button{ width:100%; border:none; border-radius:9px; padding:6px 4px; font-weight:800; font-size:10px; background:linear-gradient(135deg, var(--dust), #8b6fd6); color:#1a0f33; }
  .metaCard button:disabled{ background:#2a2e4d; color:rgba(238,241,255,0.35); }

  .runeGrid{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-width:560px; margin-bottom:6px; }
  .runeCard{ background:var(--panel); border:1.5px solid var(--panel-edge); border-radius:16px; padding:14px 12px; width:140px; cursor:pointer; }
  .runeCard:active{ transform:scale(0.97); }
  .runeCard .rIcon{ font-size:22px; margin-bottom:6px; }
  .runeCard .rName{ font-weight:800; font-size:11.5px; margin-bottom:5px; }
  .runeCard .rDesc{ font-size:9.5px; opacity:0.65; line-height:1.35; }

  .statLine{ font-size:11px; opacity:0.7; margin:2px 0; }
  #eggToast{
    position:fixed; top:38%; left:50%; transform:translate(-50%,-50%);
    background:rgba(20,24,51,0.95); border:1.5px solid var(--gold); border-radius:16px;
    padding:14px 22px; font-size:13px; color:var(--gold); z-index:30; text-align:center;
    opacity:0; transition:opacity 0.4s; pointer-events:none;
  }

  /* ===== TELEFON DÜZENİ ===== */
  @media (max-width: 700px) and (orientation: portrait){
    #topBar{
      height:52px; padding:0 5px; gap:3px;
    }
    #exitBtn{font-size:10px; padding:6px 7px; border-radius:10px;}
    .stat{font-size:10px; gap:2px;}
    #waveStat{font-size:8px; line-height:1.05; min-width:34px;}
    #speedBtn,#autoWaveBtn,#nextWaveBtn{font-size:8px; padding:6px 5px; border-radius:10px;}
    #autoWaveBtn{max-width:42px; overflow:hidden;}
    #bottomBar{gap:4px; padding:5px 5px calc(5px + env(safe-area-inset-bottom));}
    .towerCard{flex-basis:54px; min-width:54px;}
    .towerCard .tname{font-size:7px;}
    .towerCard .tkind{display:none;}
    #towerPanel{max-width:calc(100vw - 20px); min-width:150px;}
    #overlay{padding:58px 12px 86px;}
  }

</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="topBar">
  <button id="exitBtn" title="Ana menüye çık">✕</button>
  <div class="stat" id="goldStat">◆<span id="goldVal">150</span></div>
  <div id="waveStat">Dalga <b id="waveVal">0</b>/<span id="maxWaveVal">10</span></div>
  <div class="stat" id="lifeStat">♥<span id="lifeVal">20</span></div>
  <button id="speedBtn">x1</button>
  <button id="autoWaveBtn" title="Otomatik sonraki dalga">⟳ AUTO</button>
  <button id="nextWaveBtn">BAŞLAT</button>
</div>

<div id="bottomBar"></div>

<div id="towerPanel">
  <div class="tpTitle" id="tpName">-</div>
  <div class="tpRow"><span>Seviye</span><span id="tpLevel">1</span></div>
  <div class="tpRow"><span id="tpDmgLabel">Hasar</span><span id="tpDmg">-</span></div>
  <div class="tpRow"><span>Menzil</span><span id="tpRange">-</span></div>
  <div class="tpBtns">
    <button id="upgradeBtn">Yükselt ◆<span id="tpUpCost">-</span></button>
    <button id="sellBtn">Sat ◆<span id="tpSellVal">-</span></button>
    <button id="closeTpBtn">✕</button>
  </div>
</div>

<div id="overlay"></div>
<div id="eggToast"></div>

<script>
/* ===== HubLand hesaba özel kayıt katmanı ===== */
(function(){
  const GAME_PREFIXES=['avd_'];
  const UID_SESSION_KEY='hubland_active_uid';
  const MIGRATION_OWNER_KEY='hubland_legacy_owner_ayvadisi';
  const rawGet=Storage.prototype.getItem;
  const rawSet=Storage.prototype.setItem;
  const rawRemove=Storage.prototype.removeItem;
  const rawKey=Storage.prototype.key;
  function activeUid(){ return sessionStorage.getItem(UID_SESSION_KEY)||''; }
  function isGameKey(key){ return GAME_PREFIXES.some(p=>String(key).startsWith(p)); }
  function scopedKey(key){
    const uid=activeUid();
    return uid&&isGameKey(key)?'__hubland_'+uid+'__'+key:String(key);
  }
  Storage.prototype.getItem=function(key){
    if(this===localStorage) return rawGet.call(this,scopedKey(key));
    return rawGet.call(this,key);
  };
  Storage.prototype.setItem=function(key,value){
    if(this===localStorage) return rawSet.call(this,scopedKey(key),value);
    return rawSet.call(this,key,value);
  };
  Storage.prototype.removeItem=function(key){
    if(this===localStorage) return rawRemove.call(this,scopedKey(key));
    return rawRemove.call(this,key);
  };
  function migrateLegacyTo(uid){
    if(!uid)return;
    const owner=rawGet.call(localStorage,MIGRATION_OWNER_KEY);
    if(owner)return;
    const keys=[];
    for(let i=0;i<localStorage.length;i++){
      const k=rawKey.call(localStorage,i);
      if(k&&isGameKey(k)&&!k.startsWith('__hubland_'))keys.push(k);
    }
    for(const k of keys){
      const value=rawGet.call(localStorage,k);
      const target='__hubland_'+uid+'__'+k;
      if(value!==null&&rawGet.call(localStorage,target)===null) rawSet.call(localStorage,target,value);
    }
    rawSet.call(localStorage,MIGRATION_OWNER_KEY,uid);
  }
  window.addEventListener('message',function(e){
    const d=e.data||{};
    if(d.type!=='HUBLAND_AUTH_CONTEXT')return;
    const next=String(d.uid||'');
    const current=activeUid();
    if(next&&next!==current){
      migrateLegacyTo(next);
      sessionStorage.setItem(UID_SESSION_KEY,next);
      location.reload();
    }
  });
  try{if(window.parent&&window.parent!==window)window.parent.postMessage({type:'HUBLAND_REQUEST_AUTH_CONTEXT'},'*')}catch(_){}
})();
/* ===== /HubLand hesaba özel kayıt katmanı ===== */

(function(){
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  let W,H,DPR;
  const TOP_H = 56;
  let playTopH = TOP_H;
  let BOTTOM_H = 62;

  // ================= META (kalıcı ilerleme) =================
  const META_KEY = 'avd_meta_v6';
  const META_KEY_OLD = 'avd_meta_v5';
  function loadMeta(){
    const def = { dust:0, up:{gold:0,life:0,dmg:0}, unlocks:{lightning:false,sniper:false,beacon:false,chrono:false,charge:false,market:false,summon:false,ooze:false,moonshard:false,bonecaller:false,starcaller:false,goldmine:false,banner:false,pets:{spirit:false,ember:false,owl:false}}, stats:{games:0,bestWave:0,bestEndlessWave:0,kills:0,wins:0,hardcoreWin:false,winsByDiff:{},mapsPlayed:{},totalDust:0}, egg:false, eggClaimed:false, achievements:{} };
    try{
      let raw = localStorage.getItem(META_KEY);
      let migrating = false;
      if(!raw){ raw = localStorage.getItem(META_KEY_OLD); migrating = !!raw; }
      if(raw){
        const p = JSON.parse(raw);
        const out = {
          dust: p.dust ?? def.dust,
          up: Object.assign({}, def.up, p.up),
          unlocks: Object.assign({}, def.unlocks, p.unlocks, { pets: Object.assign({}, def.unlocks.pets, p.unlocks && p.unlocks.pets) }),
          stats: Object.assign({}, def.stats, p.stats),
          egg: p.egg ?? false,
          eggClaimed: p.eggClaimed ?? (p.egg ?? false),
          achievements: Object.assign({}, def.achievements, p.achievements)
        };
        // Eski sürümden geçiş: tek "pet" alanı vardıysa "Gölge Dostu" (spirit) olarak taşı.
        if(migrating && p.unlocks && p.unlocks.pet && !out.unlocks.pets.spirit) out.unlocks.pets.spirit = true;
        delete out.unlocks.pet; delete out.unlocks.voidmaw; delete out.unlocks.stormcaller; delete out.unlocks.obelisk;
        if(migrating){ try{ localStorage.setItem(META_KEY, JSON.stringify(out)); }catch(e){} }
        return out;
      }
    }catch(e){}
    return def;
  }
  function saveMeta(){ try{ localStorage.setItem(META_KEY, JSON.stringify(meta)); }catch(e){} scheduleTowerPlatformSync(); }
  let meta = loadMeta();

  // ================= AKTİF OYUN İLERLEMESİ (localStorage) =================
  const RUN_KEY = 'avd_run_v1';
  function saveRun(){
    if(state!==STATE.PLAY || waveActive) return; // sadece dalgalar arasında güvenle kaydet
    try{
      const data = {
        difficulty, selectedMap, gold, lives, wave, maxWave, endlessMode, infiniteMode, sessionKills,
        modifiers, timeScale,
        towers: towers.map(t=>({type:t.type,x:t.x,y:t.y,level:t.level,spent:t.spent,pathProgress:t.pathProgress,hp:t.hp,maxHp:t.maxHp,beamTimer:t.beamTimer}))
      };
      localStorage.setItem(RUN_KEY, JSON.stringify(data));
    }catch(e){}
  }
  function loadRunData(){
    try{
      const raw = localStorage.getItem(RUN_KEY);
      if(!raw) return null;
      return JSON.parse(raw);
    }catch(e){ return null; }
  }
  function clearRun(){ try{ localStorage.removeItem(RUN_KEY); }catch(e){} }

  const META_UPGRADES = {
    gold:{name:'Kaşif Cüzdanı', desc:'Başlangıç altını +14/sv', max:6, baseCost:35},
    life:{name:'Vadi Zırhı', desc:'Başlangıç canı +1/sv', max:6, baseCost:35},
    dmg:{name:'Eski Bilgelik', desc:'Tüm kule hasarı +4%/sv', max:8, baseCost:45}
  };
  function metaCost(key){ const lvl=meta.up[key]; return Math.round(META_UPGRADES[key].baseCost*(lvl+1)*(1+lvl*0.35)); }

  const TOWER_UNLOCK_COST = { lightning:150, sniper:210, beacon:170, chrono:190, charge:220, market:200, summon:230, ooze:200, moonshard:240, bonecaller:210, starcaller:270, goldmine:220, banner:210 };
  const PET_COST = 260;
  const PET_TYPES = {
    spirit:{name:'Gölge Dostu', symbol:'🐺', color:'#5eead4'},
    ember:{name:'Kor Tilki', symbol:'🦊', color:'#ff9f6b'},
    owl:{name:'Ay Baykuşu', symbol:'🦉', color:'#c084fc'}
  };

  // ================= KULELER (19) =================
  const TOWER_TYPES = {
    arrow:{name:'Yıldız Oku', kind:'tekli', cost:50, range:150, dmg:13, rate:0.42, color:'#08d9d6', glow:'rgba(8,217,214,0.55)', projSpeed:560, splash:0, symbol:'✦', hitsFlying:true, physical:true},
    ice:{name:'Buz Kristali', kind:'tekli', cost:90, range:125, dmg:8, rate:0.72, color:'#5b8def', glow:'rgba(91,141,239,0.55)', projSpeed:440, splash:0, slow:0.42, slowDur:2.0, symbol:'❄', hitsFlying:true},
    flame:{name:'Alev Fırtınası', kind:'alan', cost:150, range:105, dmg:16, rate:1.0, color:'#ff6b35', glow:'rgba(255,107,53,0.55)', projSpeed:380, splash:52, symbol:'🔥', burnDps:6, burnDur:2.5, hitsFlying:false},
    poison:{name:'Zehir Sarmaşığı', kind:'alan', cost:130, range:118, dmg:9, rate:0.85, color:'#7cd66b', glow:'rgba(124,214,107,0.55)', projSpeed:400, splash:36, symbol:'☠', poisonDps:7, poisonDur:3.2, armorBreak:true, hitsFlying:false},
    arcane:{name:'Arcane Verici', kind:'destek', cost:170, range:135, dmg:7, rate:0.9, color:'#c084fc', glow:'rgba(192,132,252,0.55)', projSpeed:500, splash:0, symbol:'◈', hitsFlying:true, auraRange:130, auraDmgBonus:0.22},
    mortar:{name:'Gölge Topu', kind:'alan', cost:240, range:170, dmg:44, rate:1.7, color:'#ffb454', glow:'rgba(255,180,84,0.55)', projSpeed:300, splash:75, symbol:'●', hitsFlying:false, physical:true},
    lightning:{name:'Yıldırım Kulesi', kind:'alan', cost:160, range:140, dmg:11, rate:0.6, color:'#f4d35e', glow:'rgba(244,211,94,0.55)', projSpeed:700, splash:0, symbol:'⚡', hitsFlying:true, chain:3, chainRange:95, requiresDust:true},
    sniper:{name:'Gölge Nişancı', kind:'tekli', cost:220, range:230, dmg:72, rate:1.75, color:'#e6e9f5', glow:'rgba(230,233,245,0.5)', projSpeed:900, splash:0, symbol:'◉', hitsFlying:true, physical:true, armorPierce:true, requiresDust:true},
    beacon:{name:'Destek Feneri', kind:'destek', cost:180, range:120, dmg:0, rate:99, color:'#ffe9a8', glow:'rgba(255,233,168,0.5)', symbol:'✺', hitsFlying:true, auraRange:140, auraRateBonus:0.28, requiresDust:true, noAttack:true},

  function computePath(){
    playArea = {x:0, y:playTopH, w:W, h:H-playTopH-BOTTOM_H};
    const sourcePoints = isPhonePortrait()
      ? (MOBILE_MAP_POINTS[selectedMap] || currentPathRel)
      : currentPathRel;
    pathPts = sourcePoints.map(p=>({x:playArea.x+p.x*playArea.w, y:playArea.y+p.y*playArea.h}));
    segLen=[]; totalLen=0;
    for(let i=0;i<pathPts.length-1;i++){
      const d = Math.hypot(pathPts[i+1].x-pathPts[i].x, pathPts[i+1].y-pathPts[i].y);
      segLen.push(d); totalLen += d;
    }
  }
  function posAtProgress(p){
    let d = Math.max(0, p);
    for(let i=0;i<segLen.length;i++){
      if(d<=segLen[i] || i===segLen.length-1){
        const t = segLen[i]>0 ? Math.max(0,Math.min(1,d/segLen[i])) : 0;
        const a=pathPts[i], b=pathPts[i+1];
        return {x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t};
      }
      d -= segLen[i];
    }
    return pathPts[pathPts.length-1];
  }
  function distToSeg(px,py,a,b){
    const dx=b.x-a.x, dy=b.y-a.y, len2=dx*dx+dy*dy;
    let t = len2>0 ? ((px-a.x)*dx+(py-a.y)*dy)/len2 : 0;
    t = Math.max(0,Math.min(1,t));
    return Math.hypot(px-(a.x+dx*t), py-(a.y+dy*t));
  }
  function distToPath(x,y){
    let best=Infinity;
    for(let i=0;i<pathPts.length-1;i++) best = Math.min(best, distToSeg(x,y,pathPts[i],pathPts[i+1]));
    return best;
  }

        if(spec.requiresDust && !meta.unlocks[type]) return;
        if(spec.mapOnly && spec.mapOnly!==selectedMap) return;
        if(selectedType===type){ selectedType=null; clearCardSelection(); return; }
        selectedType = type; selectedTower=null; hideTowerPanel();
        clearCardSelection();
        card.classList.add('selected');
      });
    });
    updateCardCosts();
  }
  function clearCardSelection(){ document.querySelectorAll('.towerCard').forEach(c=>c.classList.remove('selected')); }
  function updateCardLocks(){
    document.querySelectorAll('.towerCard').forEach(c=>{
      const type = c.dataset.type;
      const spec = TOWER_TYPES[type];
      const mapLocked = !!(spec.mapOnly && spec.mapOnly!==selectedMap);
      c.classList.toggle('locked', !!(spec.requiresDust && !meta.unlocks[type]) || mapLocked);
    });
  }
  // Rünlerle (örn. Pazarlık Ustası) değişen kule maliyetlerini alt bardaki fiyat
  // etiketlerinde de anında yansıtır, böylece gösterilen fiyat her zaman gerçek
  // düşecek altın miktarıyla birebir eşleşir.
  function realCost(type){
    const spec = TOWER_TYPES[type];
    if(spec.noDiscount) return spec.cost;
    return Math.max(1, Math.round(spec.cost*modifiers.costMul));
  }
  function updateCardCosts(){
    document.querySelectorAll('.towerCard').forEach(c=>{
      const type = c.dataset.type;
      const valEl = c.querySelector('.tcostVal');
      if(valEl) valEl.textContent = realCost(type);
    });
  }

  function renderGameOver(won){
    state = STATE.OVER;
    showOverlay();
    const riskBonus = infiniteMode ? Math.max(0,(100-endlessCustomLives))*0.5 : 0;
    const dustEarned = Math.round(wave*3 + sessionKills*0.2 + (won?40:0) + riskBonus);
    meta.dust += dustEarned;
    meta.stats.totalDust = (meta.stats.totalDust||0) + dustEarned;
    meta.stats.games++;
    meta.stats.bestWave = Math.max(meta.stats.bestWave, wave);
    if(infiniteMode) meta.stats.bestEndlessWave = Math.max(meta.stats.bestEndlessWave||0, wave);
    meta.stats.kills += sessionKills;
    if(won){
      meta.stats.wins = (meta.stats.wins||0)+1;
      if(difficulty==='hardcore') meta.stats.hardcoreWin = true;
      if(!meta.stats.winsByDiff) meta.stats.winsByDiff = {};
      meta.stats.winsByDiff[difficulty] = true;
      if(!tookDamageThisRun) meta.stats.flawlessWin = true;
    }
    saveMeta();
    clearRun();
    checkAchievements();
    overlay.innerHTML = `
      <h1>${won ? 'ONUR MADALYASI' : 'VADİ DÜŞTÜ'}</h1>

      <div class="sub">${won ? 'tüm dalgaları başarıyla tamamladın' : 'gölgeler kapıdan içeri sızdı'} · yenilen düşman: ${sessionKills}</div>

  function captureThumb(){

      const tmp=document.createElement('canvas'); tmp.width=tw; tmp.height=th;
      const tctx=tmp.getContext('2d');
      tctx.drawImage(canvas,0,0,tw,th);
      return tmp.toDataURL('image/jpeg',0.55);
    }catch(e){ return null; }
  }
  function checkAchievements(){
    let anyNew=false;
    for(const a of ACHIEVEMENTS){
      if(meta.achievements[a.id]) continue;
      let ok=false;
      try{ ok = !!a.cond(); }catch(e){ ok=false; }
      if(ok){
        meta.achievements[a.id] = { date: Date.now(), thumb: captureThumb() };
        anyNew = true;
        showEggToast('🏆 Başarım kazanıldı: '+a.name);
      }
    }
    if(anyNew) saveMeta();
  }

  // resumeData verilirse localStorage'dan kaydedilmiş bir koşu devam ettirilir,
  // verilmezse sıfırdan yeni bir oyun başlatılır.
  function resetGame(resumeData){
    if(resumeData){
      difficulty = resumeData.difficulty; selectedMap = resumeData.selectedMap;
      currentPathRel = MAPS[selectedMap].points; computePath();
      gold = resumeData.gold; lives = resumeData.lives; wave = resumeData.wave; maxWave = resumeData.maxWave;
      endlessMode = resumeData.endlessMode; sessionKills = resumeData.sessionKills;
      infiniteMode = !!resumeData.infiniteMode;
      modifiers = Object.assign(freshModifiers(), resumeData.modifiers);
      timeScale = resumeData.timeScale || 1;
      towers = resumeData.towers.map(t=>({type:t.type,x:t.x,y:t.y,level:t.level,spent:t.spent,cooldown:0,chargeTarget:null,chargingUntil:0,pathProgress:t.pathProgress,hp:t.hp,maxHp:t.maxHp,beamTimer:t.beamTimer}));
      tookDamageThisRun = true; // devam eden koşuda geçmiş hasar bilinmiyor, güvenli tarafta kal
    } else {
      currentPathRel = MAPS[selectedMap].points;
      computePath();
      const d = DIFF[difficulty];
      gold = d.gold + meta.up.gold*14;
      lives = infiniteMode ? (endlessCustomLives + meta.up.life*1) : (d.lives + meta.up.life*1);
      wave = 0; sessionKills = 0; tookDamageThisRun = false; goldSpentThisRun = 0;
      // Sonsuz Mod'da dalga limiti yok, dalgalar sonsuza kadar sürer.
      endlessMode = infiniteMode;
      maxWave = infiniteMode ? 999999 : d.waves;
      towers = [];
      modifiers = freshModifiers();
      timeScale = 1;
      clearRun();
      meta.stats.mapsPlayed[selectedMap] = true; saveMeta();
    }
    enemies=[]; projectiles=[]; particles=[]; floaters=[]; allies=[]; hazards=[];
    selectedType=null; selectedTower=null;
    spawnQueue=[]; spawnTimer=0; waveActive=false;
    pets = Object.keys(PET_TYPES).filter(k=>meta.unlocks.pets[k]).map(k=>({
      kind:k, x: playArea.x+playArea.w/2+(Math.random()-0.5)*40, y: playArea.y+playArea.h/2+(Math.random()-0.5)*40,
      target:null, retargetCd:0, attackCd:5+Math.random()*4
    }));
    document.getElementById('speedBtn').textContent='x'+timeScale;
    document.getElementById('speedBtn').classList.toggle('active', timeScale>1);
    document.getElementById('maxWaveVal').textContent = endlessMode ? '∞' : maxWave;
    updateHUD(); buildBottomBar(); updateCardLocks();
    document.getElementById('nextWaveBtn').disabled = false;
    hideTowerPanel(); clearCardSelection();
  }

  function updateHUD(){
    document.getElementById('goldVal').textContent = Math.floor(gold);
    document.getElementById('lifeVal').textContent = Math.max(0,Math.floor(lives));
    document.getElementById('waveVal').textContent = wave;
    document.getElementById('maxWaveVal').textContent = endlessMode ? '∞' : maxWave;
    updateCardCosts();
    if(state===STATE.PLAY) checkAchievements();
  }

  function buildWave(n){
    const d = DIFF[difficulty];
    const list = [];
    // Miniboss sıklığı artık sabit 5 değil, zorluğun toplam dalga sayısına göre ölçekleniyor
    const totalWavesRef = infiniteMode ? 60 : d.waves;
    const bossInterval = Math.min(10, Math.max(4, Math.round(totalWavesRef/6)));
    if(n % bossInterval === 0) list.push(MAPS[selectedMap].boss);
    // Her zorluğun son dalgasında nihai The Grand Boss çıkar
    if(!infiniteMode && n === d.waves) list.push('grand_boss');
    const count = Math.floor((5+n*1.5)*d.spawnMul);
    const eligible = [];
    ENEMY_POOL.forEach(e=>{ if(e.minWave<=n){ for(let w=0; w<e.weight; w++) eligible.push(e.type); } });
    const exclusive = MAP_EXCLUSIVE_ENEMIES[selectedMap];
    if(exclusive && n>=2){ for(let w=0;w<3;w++) eligible.push(exclusive); }
    for(let i=0;i<count;i++) list.push(eligible[Math.floor(Math.random()*eligible.length)]);
    return list;
  }

  function startWave(){
    if(waveActive || state!==STATE.PLAY) return;
    wave++;
    if(wave > maxWave) endlessMode = true;
    const list = buildWave(wave);
    spawnQueue = list.map((t,i)=>({type:t, delay:i*0.5}));
    spawnTimer = 0; waveActive = true;
    document.getElementById('nextWaveBtn').disabled = true;
    updateHUD();
  }

  function spawnEnemy(type, overrideProgress){
    const d = DIFF[difficulty];
    const base = ENEMY_TYPES[type];
    const waveScale = wave>12 ? (1+(wave-12)*0.08) : 1;
    const hp = Math.round((base.baseHp + wave*base.baseHp*0.15) * d.hpMul * waveScale);
    enemies.push({
      type, hp, maxHp:hp, progress: overrideProgress||0,
      speed: base.speed*(0.94+Math.random()*0.12),
      slowUntil:0, slowFactor:1, burnUntil:0, burnDps:0,
      poisonUntil:0, poisonDps:0, armorBrokenUntil:0,
      r: base.r, spawnTimer: base.spawner?3.2:0, shieldClock:0, shielded:false, revived:false
    });
  }

  function closestProgressOnPath(px,py){
    let best=Infinity, bestProg=0, acc=0;
    for(let i=0;i<pathPts.length-1;i++){
      const a=pathPts[i], b=pathPts[i+1];
      const dx=b.x-a.x, dy=b.y-a.y, len2=dx*dx+dy*dy;
      let t = len2>0 ? ((px-a.x)*dx+(py-a.y)*dy)/len2 : 0;
      t = Math.max(0,Math.min(1,t));
      const cx=a.x+dx*t, cy=a.y+dy*t;
      const dd = Math.hypot(px-cx,py-cy);
      if(dd<best){ best=dd; bestProg = acc + segLen[i]*t; }
      acc += segLen[i];
    }
    return bestProg;
  }
  function canPlaceAt(x,y){
    if(x<playArea.x+22||x>playArea.x+playArea.w-22||y<playArea.y+22||y>playArea.y+playArea.h-22) return false;
    if(distToPath(x,y) < 44) return false;
    for(const t of towers){
      if(Math.hypot(t.x-x,t.y-y) < 44) return false;
      // Düzyazıcı'nın çok yakınına başka kule konulamaz
      if(TOWER_TYPES[t.type].onPathOnly && Math.hypot(t.x-x,t.y-y) < 90) return false;
    }
    return true;
  }
  function canPlaceOnPathTower(x,y,spec){
    if(spec.mapOnly && selectedMap!==spec.mapOnly) return false;
    if(distToPath(x,y) > 34) return false;
    const prog = closestProgressOnPath(x,y);
    for(const t of towers){
      if(TOWER_TYPES[t.type].onPathOnly && Math.abs((t.pathProgress||0)-prog) < 80) return false;
    }
    return true;
  }
  function placeTower(x,y,type){
    const spec = TOWER_TYPES[type];
    if(spec.requiresDust && !meta.unlocks[type]){ flashInvalid(x,y); return; }
    if(towers.length>=DIFF[difficulty].towerLimit){ flashInvalid(x,y); showEggToast('Bu zorlukta kule limitine ulaştın ('+DIFF[difficulty].towerLimit+').'); return; }
    const cost = realCost(type);
    if(gold<cost){ flashGold(); return; }
    if(spec.onPathOnly){
      if(!canPlaceOnPathTower(x,y,spec)){ flashInvalid(x,y); return; }
      const prog = closestProgressOnPath(x,y);
      const pos = posAtProgress(prog);
      gold -= cost; goldSpentThisRun += cost;
      towers.push({type,x:pos.x,y:pos.y,level:1,cooldown:0,spent:cost,pathProgress:prog,hp:spec.maxHp,maxHp:spec.maxHp,beamTimer:spec.beamInterval});
      updateHUD(); checkAchievements(); saveRun();
      return;
    }
    if(!canPlaceAt(x,y)){ flashInvalid(x,y); return; }
    gold -= cost; goldSpentThisRun += cost;
    towers.push({type,x,y,level:1,cooldown:0,spent:cost, chargeTarget:null, chargingUntil:0});
    updateHUD();
    checkAchievements();
    saveRun();
  }
  let invalidFlash=null;
  function flashInvalid(x,y){ invalidFlash={x,y,t:0.4}; }
  function flashGold(){
    const el=document.getElementById('goldStat');
    el.style.transform='scale(1.15)';
    setTimeout(()=>{el.style.transform='scale(1)';},150);
  }

  function towerCurrentStats(tw){
    const base = TOWER_TYPES[tw.type];
    const lvlMul = tw.level===1?1: tw.level===2?1.5:2.2;
    const rangeMul = tw.level===1?1: tw.level===2?1.12:1.26;
    let auraDmgMul=1, auraRateMul=1;
    for(const other of towers){
      if(other===tw) continue;
      const ospec = TOWER_TYPES[other.type];
      if(ospec.kind!=='destek') continue;
      const d = Math.hypot(other.x-tw.x, other.y-tw.y);
      if(d>ospec.auraRange) continue;
      if(ospec.auraDmgBonus && !(other.type==='arcane'&&tw.type==='arcane')) auraDmgMul *= (1+ospec.auraDmgBonus);
      if(ospec.auraRateBonus) auraRateMul *= (1-ospec.auraRateBonus);
    }
    for(const pt of pets){ if(Math.hypot(pt.x-tw.x, pt.y-tw.y) <= 110) auraDmgMul *= 1.18; }
    return {
      dmg: base.dmg*lvlMul*modifiers.dmgMul*auraDmgMul*(1+meta.up.dmg*0.04),
      range: base.range*rangeMul*modifiers.rangeMul,
      rate: base.rate*modifiers.rateMul*auraRateMul,
      splash: base.splash,
      slow: base.slow ? base.slow+modifiers.slowBonus : 0,
      slowDur: base.slowDur,
      burnDps: base.burnDps ? base.burnDps*modifiers.dotMul : 0,
      burnDur: base.burnDur,
      poisonDps: base.poisonDps ? base.poisonDps*modifiers.dotMul : 0,
      poisonDur: base.poisonDur,
      armorBreak: base.armorBreak,
      chain: base.chain, chainRange: base.chainRange,
      armorPierce: base.armorPierce,
      freezeDur: base.freezeDur,
      income: base.baseIncome ? base.baseIncome*lvlMul : 0
    };
  }
  function upgradeCost(tw){ const base=TOWER_TYPES[tw.type].cost; return tw.level===1?Math.round(base*0.8):Math.round(base*1.3); }
  function sellValue(tw){ return Math.round(tw.spent*0.6); }

  // ================= GİRDİ =================
  function canvasPointFromEvent(e){
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches? e.touches[0].clientX : e.clientX)-rect.left;
    const cy = (e.touches? e.touches[0].clientY : e.clientY)-rect.top;
    return {x:cx,y:cy};
  }

  // gizli etkileşim (oyun içi) -- konumu her karede yeniden hesaplanır
  let moonClicks=0, moonLastClick=0;
  function moonPos(){ return {x:W*0.85, y:H*0.12}; }

  canvas.addEventListener('pointerdown', (e)=>{
    if(state!==STATE.PLAY) return;
    const p = canvasPointFromEvent(e);
    const mp = moonPos();
    if(Math.hypot(p.x-mp.x, p.y-mp.y) < 32){
      const now = performance.now();
      if(now-moonLastClick>700) moonClicks=0;
      moonLastClick = now; moonClicks++;
      // Bu easter egg artık TÜM OYUN BOYUNCA (sadece bu oturumda değil) yalnızca
      // bir kez kullanılabilir - meta.eggClaimed kalıcı olarak localStorage'da tutulur.
      if(moonClicks>=5 && !meta.eggClaimed){
        moonClicks=0;
        meta.eggClaimed = true; meta.egg = true;
        const reward = 320;
        meta.dust += reward; meta.stats.totalDust = (meta.stats.totalDust||0)+reward; saveMeta();
        showEggToast('✨ Gizemli bir ışık seni fark etti... +'+reward+' ✦ (bir daha asla)');
        spawnParticles(mp.x, mp.y, '#ffe9a8', 30);
        checkAchievements();
      } else if(moonClicks>=5 && meta.eggClaimed){
        moonClicks=0;
        showEggToast('Ay artık sessiz... bu sırrı zaten keşfettin.');
      }
      return;
    }
    if(p.y<playArea.y || p.y>playArea.y+playArea.h) return;
    if(selectedType){ placeTower(p.x,p.y,selectedType); return; }
    let hit=null;
    for(const t of towers) if(Math.hypot(t.x-p.x,t.y-p.y)<26){ hit=t; break; }
    if(hit){ selectedTower=hit; showTowerPanel(hit); }
    else { selectedTower=null; hideTowerPanel(); }
  });

  document.getElementById('closeTpBtn').addEventListener('click', ()=>{selectedTower=null; hideTowerPanel();});

  document.getElementById('nextWaveBtn').addEventListener('click', startWave);

  // ================= OYUN MANTIĞI =================
  function nearestTarget(tw, range, hitsFlying){
    let best=null, bestProg=-1;
    for(const e of enemies){
      if(e.flyingFlag && !hitsFlying) continue;
      const pos = posAtProgress(e.progress);
      const d = Math.hypot(pos.x-tw.x, pos.y-tw.y);
      if(d<=range && e.progress>bestProg){ best=e; bestProg=e.progress; }
    }
    return best;
  }
  function spawnParticles(x,y,color,n){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=60+Math.random()*90;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.4+Math.random()*0.3,maxLife:0.5,color});
    }
  }
  function spawnFloater(x,y,text,color){ floaters.push({x,y,text,color,life:0.9,vy:-40}); }

  function applyDamage(e, dmg, physical, piercesArmor){
    const eSpec = ENEMY_TYPES[e.type];
    if(e.shielded) return;
    if(eSpec.evade && Math.random()<eSpec.evade) return;
    let d = dmg;
    const now = performance.now()/1000;
    if(eSpec.armor && physical && !piercesArmor && now>e.armorBrokenUntil) d *= (1-eSpec.armor);
    if(Math.random()<modifiers.critChance) d *= 2;
    e.hp -= d;
  }

  function updatePet(dt){
    for(const pet of pets){
      pet.retargetCd -= dt;
      if(!pet.target || pet.retargetCd<=0 || Math.hypot(pet.target.x-pet.x, pet.target.y-pet.y)<10){
        pet.target = { x: playArea.x+20+Math.random()*Math.max(1,playArea.w-40), y: playArea.y+20+Math.random()*Math.max(1,playArea.h-40) };
        pet.retargetCd = 3+Math.random()*3;
      }
      const dx=pet.target.x-pet.x, dy=pet.target.y-pet.y, d=Math.hypot(dx,dy);
      if(d>2){ pet.x += (dx/d)*70*dt; pet.y += (dy/d)*70*dt; }
      pet.attackCd -= dt;
      if(pet.attackCd<=0){
        let target=null, bestD=160;
        for(const e of enemies){
          const pos=posAtProgress(e.progress);
          const dd=Math.hypot(pos.x-pet.x,pos.y-pet.y);
          if(dd<bestD){ target=e; bestD=dd; }
        }
        if(target){
          applyDamage(target, 55, false);
          const pos = posAtProgress(target.progress);
          spawnParticles(pos.x,pos.y,'#ffd166',12);
          spawnParticles(pet.x,pet.y,'#ffd166',8);
        }
        pet.attackCd = 7+Math.random()*5;
      }
    }
  }

  function update(dt){
    dt *= timeScale;
    const now = performance.now()/1000;

    if(waveActive){
      spawnTimer += dt;
      while(spawnQueue.length && spawnQueue[0].delay<=spawnTimer) spawnEnemy(spawnQueue.shift().type);
      if(!spawnQueue.length && enemies.length===0){
        waveActive=false;
        const marketIncome = towers.filter(t=>TOWER_TYPES[t.type].kind==='market').reduce((s,t)=> s+towerCurrentStats(t).income, 0);
        gold += 15+wave*4+modifiers.passiveGold+marketIncome;
        updateHUD();
        checkAchievements();
        if(!endlessMode && wave>=maxWave){ renderGameOver(true); return; }
        saveRun();
        renderRuneChoice();
      }
    }

    updatePet(dt);

    for(const e of enemies){
      const eSpec = ENEMY_TYPES[e.type];
      let sp = e.speed;
      if(now<e.slowUntil) sp *= e.slowFactor;
      if(eSpec.shieldCycle){
        e.shieldClock += dt;
        e.shielded = (e.shieldClock % 4.0) < 1.5;
      }
      for(const other of enemies){
        if(other!==e && ENEMY_TYPES[other.type].hasteAura){
          const po=posAtProgress(other.progress), pe=posAtProgress(e.progress);
          if(Math.hypot(po.x-pe.x,po.y-pe.y)<100) sp *= 1.15;
        }
      }
      // Düzyazıcı kulesi yola dikilmiş bir engel gibi davranır - düşman onu kırmadan geçemez
      let blocker=null, blockerDist=Infinity;
      for(const tw of towers){
        if(TOWER_TYPES[tw.type].onPathOnly && tw.hp>0 && tw.pathProgress>=e.progress-1){
          const dd = tw.pathProgress-e.progress;
          if(dd<blockerDist){ blockerDist=dd; blocker=tw; }
        }
      }
      if(blocker && blockerDist<26){
        blocker.hp -= eSpec.dmg*dt;
        if(blocker.hp<=0){
          spawnParticles(blocker.x,blocker.y,'#ffffff',24);
          towers = towers.filter(t=>t!==blocker);
        }
      } else {
        e.progress += sp*dt;
      }
      if(now<e.burnUntil) applyDamage(e, e.burnDps*dt, false);
      if(now<e.poisonUntil) applyDamage(e, e.poisonDps*dt, false);
      e.flyingFlag = !!eSpec.flying;
      if(eSpec.healer){
        for(const other of enemies){
          if(other===e) continue;
          const p1=posAtProgress(e.progress), p2=posAtProgress(other.progress);
          if(Math.hypot(p1.x-p2.x,p1.y-p2.y)<90) other.hp = Math.min(other.maxHp, other.hp+other.maxHp*0.01*dt*10);
        }
      }
      if(eSpec.spawner){
        e.spawnTimer -= dt;
        if(e.spawnTimer<=0){
          e.spawnTimer = 3.2;
          const babyHp = Math.round((ENEMY_TYPES.shadow.baseHp+wave*ENEMY_TYPES.shadow.baseHp*0.10)*DIFF[difficulty].hpMul*0.4);
          enemies.push({type:'shadow', hp:babyHp, maxHp:babyHp, progress:e.progress, speed:ENEMY_TYPES.shadow.speed*1.05, slowUntil:0, slowFactor:1, burnUntil:0, burnDps:0, poisonUntil:0, poisonDps:0, armorBrokenUntil:0, r:ENEMY_TYPES.shadow.r, spawnTimer:0, shieldClock:0, shielded:false, revived:false});
        }
      }
    }
    for(let i=enemies.length-1;i>=0;i--){
      const e = enemies[i];
      const eSpec = ENEMY_TYPES[e.type];
      if(e.progress>=totalLen){
        lives -= eSpec.dmg;
        tookDamageThisRun = true;
        enemies.splice(i,1); updateHUD();
        if(lives<=0){ renderGameOver(false); return; }
      } else if(e.hp<=0){
        const pos = posAtProgress(e.progress);
        if(eSpec.revive && !e.revived){
          e.revived = true; e.hp = e.maxHp*0.35;
          spawnParticles(pos.x,pos.y,'#ffffff',14);
          continue;
        }
        gold += eSpec.reward;
        sessionKills++;
        if(eSpec.boss){ meta.stats.bossKills = (meta.stats.bossKills||0)+1; saveMeta(); }
        spawnParticles(pos.x,pos.y,eSpec.color,eSpec.boss?26:10);
        if(eSpec.bonus) spawnFloater(pos.x,pos.y,'+'+eSpec.reward+' ◆','#ffd166');
        enemies.splice(i,1); updateHUD();
      }
    }

    // kuleler
    for(const tw of towers){
      const spec = TOWER_TYPES[tw.type];
      if(spec.kind==='market') continue;
      if(spec.onPathOnly){
        tw.beamTimer -= dt;
        if(tw.beamTimer<=0){
          const bossRef = ENEMY_TYPES[MAPS[selectedMap].boss];
          const beamDmg = Math.round((bossRef?bossRef.baseHp:1000)*0.5);
          for(const e of enemies) applyDamage(e, beamDmg, false);
          spawnParticles(tw.x,tw.y,'#ffffff',34);
          tw.beamTimer = spec.beamInterval||10;
        }
        continue;
      }
      if(spec.summon){
        tw.cooldown -= dt;
        if(tw.cooldown<=0){
          allies.push({progress: totalLen, speed: spec.allySpeed||95, attackCd:0, life: spec.allyLife||12, dmg: spec.allyDmg||20});
          tw.cooldown = spec.rate;
        }
        continue;
      }
      const stats = towerCurrentStats(tw);
      if(spec.hazard){
        tw.cooldown -= dt;
        if(tw.cooldown<=0){
          const target = nearestTarget(tw, stats.range, true);
          if(target){
            const pos = posAtProgress(target.progress);
            hazards.push({x:pos.x,y:pos.y,radius:spec.hazardRadius||50,dps:stats.dmg,until:now+(spec.hazardDur||5)});
          }
          tw.cooldown = stats.rate;
        }
        continue;
      }
      if(spec.charge){
        if(tw.chargeTarget){
          if(!enemies.includes(tw.chargeTarget)){ tw.chargeTarget=null; }
          else if(now>=tw.chargingUntil){
            projectiles.push({x:tw.x,y:tw.y,target:tw.chargeTarget,dmg:stats.dmg,speed:900,color:spec.color,splash:0,physical:spec.physical});
            tw.chargeTarget=null;
            tw.cooldown = stats.rate;
          }
        } else {
          tw.cooldown -= dt;
          if(tw.cooldown<=0){
            const target = nearestTarget(tw, stats.range, spec.hitsFlying);
            if(target){ tw.chargeTarget=target; tw.chargingUntil = now+(spec.chargeTime||0.7); }
          }
        }
        continue;
      }
      if(spec.noAttack) continue;
      tw.cooldown -= dt;
      if(tw.cooldown<=0){
        if(spec.pulse){
          for(const e of enemies){
            const pos=posAtProgress(e.progress);
            if(Math.hypot(pos.x-tw.x,pos.y-tw.y)<=stats.range){
              applyDamage(e, stats.dmg, false);
              if(!ENEMY_TYPES[e.type].immuneSlow){ e.slowUntil=now+stats.freezeDur; e.slowFactor=0.05; }
            }
          }
          spawnParticles(tw.x,tw.y,spec.color,20);
          tw.cooldown = stats.rate;
        } else {
          const target = nearestTarget(tw, stats.range, spec.hitsFlying);
          if(target){
            projectiles.push({
              x:tw.x, y:tw.y, target, dmg:stats.dmg, speed:spec.projSpeed, color:spec.color,
              splash:stats.splash, slow:stats.slow, slowDur:stats.slowDur,
              burnDps:stats.burnDps, burnDur:stats.burnDur, poisonDps:stats.poisonDps, poisonDur:stats.poisonDur,
              armorBreak:stats.armorBreak, physical:spec.physical, armorPierce:stats.armorPierce,
              chain:stats.chain, chainRange:stats.chainRange
            });
            tw.cooldown = stats.rate;
          }
        }
      }
    }

    for(let i=projectiles.length-1;i>=0;i--){
      const p = projectiles[i];
      if(!enemies.includes(p.target)){ projectiles.splice(i,1); continue; }
      const tSpec = ENEMY_TYPES[p.target.type];
      const tp = posAtProgress(p.target.progress);
      const dx=tp.x-p.x, dy=tp.y-p.y, d=Math.hypot(dx,dy);
      const step = p.speed*dt;
      if(d<=step || d<8){
        applyDamage(p.target, p.dmg, p.physical, p.armorPierce);
        if(p.slow && !tSpec.immuneSlow){ p.target.slowUntil=now+p.slowDur; p.target.slowFactor=1-p.slow; }
        if(p.burnDps && !tSpec.immuneBurn){ p.target.burnUntil=now+p.burnDur; p.target.burnDps=p.burnDps; }
        if(p.poisonDps && !tSpec.immunePoison){ p.target.poisonUntil=now+p.poisonDur; p.target.poisonDps=p.poisonDps; if(p.armorBreak) p.target.armorBrokenUntil=now+p.poisonDur; }
        if(p.splash>0){
          for(const e2 of enemies){
            if(e2===p.target) continue;
            const pos2 = posAtProgress(e2.progress);
            if(Math.hypot(pos2.x-tp.x,pos2.y-tp.y)<=p.splash) applyDamage(e2, p.dmg*0.55, p.physical, p.armorPierce);
          }
        }
        if(p.chain){
          const hitSet = new Set([p.target]);
          let curTarget=p.target, remaining=p.chain-1, curDmg=p.dmg;
          while(remaining>0){
            curDmg *= 0.75;
            const cp = posAtProgress(curTarget.progress);
            let next=null, bestD=Infinity;
            for(const e3 of enemies){
              if(hitSet.has(e3)) continue;
              const p3 = posAtProgress(e3.progress);
              const dd = Math.hypot(p3.x-cp.x, p3.y-cp.y);
              if(dd<=p.chainRange && dd<bestD){ next=e3; bestD=dd; }
            }
            if(!next) break;
            applyDamage(next, curDmg, false);
            const np = posAtProgress(next.progress);
            spawnParticles(np.x,np.y,p.color,6);
            hitSet.add(next); curTarget=next; remaining--;
          }
        }
        spawnParticles(tp.x,tp.y,p.color,p.splash>0?16:6);
        projectiles.splice(i,1);
      } else { p.x += (dx/d)*step; p.y += (dy/d)*step; }
    }

    // dostlar (çağırma kulesi) - "life" artık bir zamanlayıcı DEĞİL, dayanıklılık puanıdır.
    // Önceden her karede dt kadar azaltılıyordu, bu da birliklerin yolun ortasında
    // süresi dolduğu için birdenbire yok olmasına sebep oluyordu. Artık sadece yolun
    // başına ulaştıklarında (görevlerini tamamladıklarında) kayboluyorlar.
    for(let i=allies.length-1;i>=0;i--){
      const a = allies[i];
      a.progress -= a.speed*dt;
      a.attackCd -= dt;
      if(a.attackCd<=0){
        const apos = posAtProgress(a.progress);
        let hit=null;
        for(const e of enemies){
          const epos = posAtProgress(e.progress);
          if(Math.hypot(epos.x-apos.x,epos.y-apos.y)<40){ hit=e; break; }
        }
        if(hit){ applyDamage(hit, a.dmg, false); spawnParticles(apos.x,apos.y,'#5eead4',8); }
        a.attackCd = 0.5;
      }
      if(a.progress<=0) allies.splice(i,1);
    }

    // sızıntı gölcükleri
    for(let i=hazards.length-1;i>=0;i--){
      const hz = hazards[i];
      if(now>hz.until){ hazards.splice(i,1); continue; }
      for(const e of enemies){
        const pos = posAtProgress(e.progress);
        if(Math.hypot(pos.x-hz.x,pos.y-hz.y)<=hz.radius) applyDamage(e, hz.dps*dt, false);
      }
    }

    for(let i=particles.length-1;i>=0;i--){
      const pt = particles[i];
      pt.life -= dt; pt.x += pt.vx*dt; pt.y += pt.vy*dt; pt.vx*=0.92; pt.vy*=0.92;
      if(pt.life<=0) particles.splice(i,1);
    }
    for(let i=floaters.length-1;i>=0;i--){
      const f = floaters[i]; f.life -= dt; f.y += f.vy*dt;
      if(f.life<=0) floaters.splice(i,1);
    }
    if(invalidFlash){ invalidFlash.t -= dt; if(invalidFlash.t<=0) invalidFlash=null; }

    if(selectedTower && document.getElementById('towerPanel').style.display==='block'){
      const cost = upgradeCost(selectedTower);
      document.getElementById('upgradeBtn').disabled = selectedTower.level>=3 || gold<cost;
    }
  }

  // ================= ÇİZİM =================
  let bgStars=[];
  function initStars(){
    bgStars=[];
    const n = Math.floor((W*H)/9500);
    for(let i=0;i<n;i++) bgStars.push({x:Math.random()*W,y:Math.random()*(H*0.5),r:Math.random()*1.5+0.4,tw:Math.random()*Math.PI*2});
  }
  function drawBackground(t){
    const theme = MAPS[selectedMap].theme;
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,theme.top); grad.addColorStop(0.6,theme.mid); grad.addColorStop(1,theme.bot);
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    const mp = moonPos();
    ctx.save();
    ctx.beginPath(); ctx.arc(mp.x,mp.y,24,0,Math.PI*2);
    ctx.fillStyle=theme.sky; ctx.shadowColor=theme.sky; ctx.shadowBlur=28;
    ctx.fill(); ctx.restore();
    for(const s of bgStars){
      const a = 0.3+0.5*Math.abs(Math.sin(t*0.0009+s.tw));
      ctx.fillStyle=`rgba(238,241,255,${a.toFixed(2)})`;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }
    ctx.save();
    ctx.strokeStyle='rgba(38,43,82,0.9)'; ctx.lineWidth=44; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); pathPts.forEach((p,i)=> i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
    ctx.strokeStyle='rgba(255,209,102,0.12)'; ctx.lineWidth=44; ctx.stroke();
    ctx.strokeStyle='rgba(8,217,214,0.35)'; ctx.lineWidth=2; ctx.setLineDash([10,10]);
    ctx.beginPath(); pathPts.forEach((p,i)=> i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }
  function drawHazards(){
    const now = performance.now()/1000;
    for(const hz of hazards){
      const remain = Math.max(0,(hz.until-now)/5);
      ctx.beginPath(); ctx.arc(hz.x,hz.y,hz.radius,0,Math.PI*2);
      ctx.fillStyle='rgba(142,198,63,'+(0.22*remain+0.06).toFixed(2)+')';
      ctx.fill();
    }
  }
  function drawTowers(){
    const now = performance.now()/1000;
    for(const tw of towers){
      const spec = TOWER_TYPES[tw.type];
      const stats = towerCurrentStats(tw);
      if(tw===selectedTower && spec.range>0){
        ctx.beginPath(); ctx.arc(tw.x,tw.y,stats.range,0,Math.PI*2);
        ctx.strokeStyle=spec.glow; ctx.lineWidth=1.5; ctx.stroke();
        ctx.fillStyle=spec.glow.replace(/0\.\d+\)/, '0.06)'); ctx.fill();
      }
      if(tw.type==='arcane' || tw.type==='beacon'){
        ctx.beginPath(); ctx.arc(tw.x,tw.y,spec.auraRange,0,Math.PI*2);
        ctx.strokeStyle = tw.type==='arcane' ? 'rgba(192,132,252,0.18)' : 'rgba(255,233,168,0.18)';
        ctx.lineWidth=1; ctx.stroke();
      }
      ctx.save(); ctx.translate(tw.x,tw.y);
      ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2);
      ctx.fillStyle='#12142e'; ctx.fill();
      ctx.lineWidth=2.5; ctx.strokeStyle=spec.color; ctx.shadowColor=spec.glow; ctx.shadowBlur=14; ctx.stroke();
      ctx.shadowBlur=0;
      ctx.font='18px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=spec.color; ctx.fillText(spec.symbol,0,1);
      if(tw.level>1){
        for(let i=0;i<tw.level-1;i++){ ctx.beginPath(); ctx.arc(-8+i*8,-26,3,0,Math.PI*2); ctx.fillStyle='#ffd166'; ctx.fill(); }
      }
      ctx.restore();
      if(spec.onPathOnly){
        const w = 30;
        ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(tw.x-w/2, tw.y-34, w, 4);
        ctx.fillStyle='#ff4d6d'; ctx.fillRect(tw.x-w/2, tw.y-34, w*Math.max(0,tw.hp/tw.maxHp), 4);
      }
      if(tw.chargeTarget){
        ctx.beginPath(); ctx.arc(tw.x,tw.y,27,0,Math.PI*2);
        ctx.strokeStyle='rgba(255,77,148,0.85)'; ctx.lineWidth=3; ctx.stroke();
      }
    }
  }
  function drawEnemies(){
    const t = performance.now()/1000;
    for(const e of enemies){
      const spec = ENEMY_TYPES[e.type];
      let pos = posAtProgress(e.progress);
      const yOff = spec.flying ? -22 : 0;
      const now = t;
      const bob = Math.sin(t*7 + e.progress*0.08) * (spec.flying?3:1.6);
      const squash = 1 + Math.sin(t*7 + e.progress*0.08) * 0.06;
      const slowed = now<e.slowUntil, burning = now<e.burnUntil, poisoned = now<e.poisonUntil;
      ctx.save(); ctx.translate(pos.x, pos.y+yOff+bob);
      ctx.scale(1/squash, squash);
      if(spec.flying){
        ctx.globalAlpha=0.25; ctx.beginPath(); ctx.ellipse(0,22,spec.r*0.9,5,0,0,Math.PI*2);
        ctx.fillStyle='#000'; ctx.fill(); ctx.globalAlpha=1;
      }
      if(spec.grand){
        const pulse = 1+0.12*Math.sin(t*4);
        ctx.beginPath(); ctx.arc(0,0,spec.r*1.5*pulse,0,Math.PI*2);
        ctx.strokeStyle='rgba(255,0,68,0.5)'; ctx.lineWidth=3; ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(0,0,spec.r,0,Math.PI*2);
      ctx.fillStyle = e.shielded ? '#cfe8ff' : (slowed?'#9fd3ff':(poisoned?'#c8f0b0':(burning?'#ffb37a':spec.color)));
      ctx.shadowColor=spec.color; ctx.shadowBlur=spec.boss?22:10;
      ctx.fill(); ctx.shadowBlur=0;
      if(spec.boss){ ctx.lineWidth=2.5; ctx.strokeStyle='#ffd166'; ctx.stroke(); }
      if(spec.spawner){ ctx.lineWidth=2; ctx.strokeStyle='#c8b6ff'; ctx.stroke(); }
      if(e.shielded){ ctx.lineWidth=2; ctx.strokeStyle='#ffffff'; ctx.stroke(); }
      ctx.scale(squash, 1/squash);
      const w = spec.r*2.2;
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-w/2,-spec.r-12,w,4);
      ctx.fillStyle='#ff4d6d'; ctx.fillRect(-w/2,-spec.r-12,w*Math.max(0,e.hp/e.maxHp),4);
      ctx.restore();
    }
  }
  function drawAllies(){
    for(const a of allies){
      const pos = posAtProgress(Math.max(0,a.progress));
      ctx.save(); ctx.translate(pos.x,pos.y);
      ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2);
      ctx.fillStyle='#5eead4'; ctx.shadowColor='rgba(94,234,212,0.7)'; ctx.shadowBlur=10; ctx.fill();
      ctx.shadowBlur=0;
      ctx.restore();
    }
  }
  function drawProjectiles(){
    for(const p of projectiles){
      ctx.save(); ctx.translate(p.x,p.y);
      ctx.beginPath(); ctx.arc(0,0,4.5,0,Math.PI*2);
      ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=10; ctx.fill();
      ctx.restore();
    }
  }
  function drawParticles(){
    for(const pt of particles){
      const a = Math.max(0, pt.life/pt.maxLife);
      ctx.fillStyle=pt.color; ctx.globalAlpha=a;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,3,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
  }
  function drawFloaters(){
    for(const f of floaters){
      ctx.globalAlpha = Math.max(0,f.life/0.9);
      ctx.fillStyle=f.color; ctx.font='13px sans-serif'; ctx.textAlign='center';
      ctx.fillText(f.text, f.x, f.y);
      ctx.globalAlpha=1;
    }
  }
  function drawInvalidFlash(){
    if(!invalidFlash) return;
    ctx.save(); ctx.globalAlpha=Math.max(0,invalidFlash.t/0.4);
    ctx.beginPath(); ctx.arc(invalidFlash.x,invalidFlash.y,26,0,Math.PI*2);
    ctx.strokeStyle='#ff4d6d'; ctx.lineWidth=3; ctx.stroke();
    ctx.restore();
  }
  function drawPet(){
    if(state!==STATE.PLAY) return;
    for(const pet of pets){
      const pspec = PET_TYPES[pet.kind] || PET_TYPES.spirit;
      ctx.save(); ctx.translate(pet.x,pet.y);
      ctx.beginPath(); ctx.moveTo(-8,-6); ctx.lineTo(-4,-17); ctx.lineTo(0,-6); ctx.closePath();
      ctx.fillStyle=pspec.color; ctx.fill();
      ctx.beginPath(); ctx.moveTo(8,-6); ctx.lineTo(4,-17); ctx.lineTo(0,-6); ctx.closePath();
      ctx.fill();
      ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2);
      ctx.fillStyle=pspec.color; ctx.shadowColor=pspec.color; ctx.shadowBlur=14; ctx.fill();
      ctx.shadowBlur=0;
      ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#1a1a2e'; ctx.fillText(pspec.symbol, 0, 1);
      ctx.restore();
    }
  }

  function render(t){
    ctx.clearRect(0,0,W,H);
    drawBackground(t);
    if(state===STATE.PLAY){
      drawHazards(); drawTowers(); drawEnemies(); drawAllies(); drawProjectiles(); drawParticles(); drawFloaters(); drawPet(); drawInvalidFlash();
    }
  }
  function loop(t){
    const dt = Math.min((t-lastT)/1000, 0.033);
    lastT = t;
    if(state===STATE.PLAY) update(dt);
    render(t);
    requestAnimationFrame(loop);
  }

  resize();
  requestAnimationFrame(loop);
  renderHome();

})();


  // ===== Platform: Reborn profil senkronizasyonu =====
  const PLATFORM_REBORN_MESSAGE = 'PLATFORM_REBORN_GAME_STATS';
  let towerSyncTimer = null;
  let lastTowerStatsJSON = '';

  function unlockedAchievementList(){
    const records = meta.achievements || {};
    const defs = (typeof ACHIEVEMENTS !== 'undefined') ? ACHIEVEMENTS : [];
    return Object.keys(records).map(id => {
      const def = defs.find(a => a.id === id) || {};
      const rec = records[id] || {};
      return {id, name:def.name || id, trophy:def.trophy || '🏆', date:Number(rec.date || 0)};
    }).sort((a,b)=>b.date-a.date);
  }

  function buildTowerPlatformStats(){
    const towerUnlocks = Object.keys(meta.unlocks || {}).filter(k => k !== 'pets' && meta.unlocks[k] === true).map(k => ({
      id:k,
      name:(typeof TOWER_TYPES !== 'undefined' && TOWER_TYPES[k] ? TOWER_TYPES[k].name : k),
      symbol:(typeof TOWER_TYPES !== 'undefined' && TOWER_TYPES[k] ? TOWER_TYPES[k].symbol : '✦')
    }));
    const pets = Object.keys((meta.unlocks && meta.unlocks.pets) || {}).filter(k => meta.unlocks.pets[k]).map(k => ({
      id:k,
      name:(typeof PET_TYPES !== 'undefined' && PET_TYPES[k] ? PET_TYPES[k].name : k),
      symbol:(typeof PET_TYPES !== 'undefined' && PET_TYPES[k] ? PET_TYPES[k].symbol : '🐾')
    }));
    const upgrades = Object.keys(meta.up || {}).filter(k => Number(meta.up[k] || 0) > 0).map(k => ({
      id:k,
      name:(typeof META_UPGRADES !== 'undefined' && META_UPGRADES[k] ? META_UPGRADES[k].name : k),
      level:Number(meta.up[k] || 0)
    }));
    return {
      market:{towers:towerUnlocks,pets,upgrades},
      highestEndlessWave:Number((meta.stats && meta.stats.bestEndlessWave) || 0),
      totalEnemiesDefeated:Number((meta.stats && meta.stats.kills) || 0),
      totalGamesPlayed:Number((meta.stats && meta.stats.games) || 0),
      moonDust:Number(meta.dust || 0),
      achievements:unlockedAchievementList(),
      achievementCount:Object.keys(meta.achievements || {}).length,
      updatedAt:Date.now()
    };
  }

  function syncTowerStatsToPlatform(force=false){
    const stats=buildTowerPlatformStats();
    const json=JSON.stringify(stats);
    if(!force && json===lastTowerStatsJSON) return;
    lastTowerStatsJSON=json;
    const message={type:PLATFORM_REBORN_MESSAGE,game:'towerDefense',version:1,stats};
    try{ if(window.parent && window.parent!==window) window.parent.postMessage(message,'*'); }catch(e){}
    try{ if(window.opener && !window.opener.closed) window.opener.postMessage(message,'*'); }catch(e){}
  }
  function scheduleTowerPlatformSync(){ clearTimeout(towerSyncTimer); towerSyncTimer=setTimeout(()=>syncTowerStatsToPlatform(false),300); }
  setInterval(()=>syncTowerStatsToPlatform(false),3000);
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')syncTowerStatsToPlatform(true)});
  window.addEventListener('pagehide',()=>syncTowerStatsToPlatform(true));
  window.addEventListener('message',e=>{if(e.data&&e.data.type==='PLATFORM_REBORN_REQUEST_STATS')syncTowerStatsToPlatform(true)});
  setTimeout(()=>syncTowerStatsToPlatform(true),700);

</script>
